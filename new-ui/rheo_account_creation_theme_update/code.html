<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#fecfd5",
                        "background-light": "#f8f6f7",
                        "background-dark": "#221018",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }</script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<!-- Top Navigation Bar -->
<div class="flex items-center bg-transparent p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex-1"></div>
<div class="flex items-center gap-2 pr-4">
<div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-xl text-slate-900">cruelty_free</span>
</div>
</div>
</div>
<!-- Header Content -->
<div class="px-6 pt-8 pb-4 text-center">
<h2 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight">Create Account</h2>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal mt-2">Join Rheo and start your journey</p>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-5 px-6 py-4 max-w-[480px] mx-auto w-full">
<!-- Full Name -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal px-1">Full Name</span>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-background-dark/50 focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal transition-all" placeholder="e.g. Jane Doe" type="text"/>
</div>
</label>
<!-- Email Address -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal px-1">Email Address</span>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-background-dark/50 focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal transition-all" placeholder="name@example.com" type="email"/>
</div>
</label>
<!-- Password -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal px-1">Password</span>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-background-dark/50 focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal transition-all" placeholder="Minimum 8 characters" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</label>
<!-- Date of Birth -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal px-1">Date of Birth</span>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-background-dark/50 focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal transition-all" type="date"/>
</div>
</label>
<!-- Terms & Conditions Hint -->
<p class="text-slate-500 dark:text-slate-400 text-xs leading-relaxed px-1 text-center mt-2">
                By tapping Next, you agree to Rheo's <a class="text-primary font-medium hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-medium hover:underline" href="#">Privacy Policy</a>.
            </p>
</div>
<!-- Footer Action -->
<div class="mt-auto flex flex-col gap-4 px-6 py-8 max-w-[480px] mx-auto w-full">
<button class="flex w-full items-center justify-center h-14 bg-primary font-bold text-lg rounded-xl shadow-lg shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all text-slate-900">
                Next
                <span class="material-symbols-outlined ml-2 text-slate-900">arrow_forward</span>
</button>
<div class="flex items-center justify-center gap-2">
<span class="text-slate-600 dark:text-slate-400 text-sm">Already have an account?</span>
<button class="text-primary font-bold text-sm hover:underline">Log in</button>
</div>
</div>
<!-- Visual Background Decoration -->
<div class="fixed -bottom-24 -left-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed -top-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
</div>
</body></html>
